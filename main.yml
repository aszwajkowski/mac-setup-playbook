---
- name: Configure local development environment
  hosts: all

  vars_files:
    - vars/default.config.yml
  
  pre_tasks:
    - name: Include playbook configuration.
      include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/vars/config.yml"
      tags: [ 'always' ]

  roles:
    - role: elliotweiser.osx-command-line-tools
    - role: geerlingguy.mac.homebrew
      tags: [ 'homebrew' ]
    - role: geerlingguy.mac.dock
      when: configure_dock
      tags: [ 'dock' ]

  tasks:
    - name: Configure macOS defaults
      include_tasks: tasks/macos-defaults.yml
      tags: [ 'macos' ]

    - block:
        - name: Run configured post-provision ansible task files.
          include_tasks: "{{ outer_item }}"
          loop_control:
            loop_var: outer_item
          with_fileglob: "{{ post_provision_tasks|default(omit) }}"
      when: post_provision_tasks is defined and post_provision_tasks | length > 0
      tags: [ 'post' ]

  handlers:
    - name: restart dock
      shell: killall Dock
      changed_when: false
